services:
  web-app:
    build: .
    ports:
      - "5000:5000"
    environment:
      - APP_USER=${USER_NAME}
    volumes:
      - ./logs:/app/logs
    networks:
      - mvc-network

  db-server:
    image: postgres:15-alpine
    environment:
      - POSTGRES_PASSWORD=rahasia
    volumes:
      - db-data:/var/lib/postgresql/data
    networks:
      - mvc-network

volumes:
  db-data:

networks:
  mvc-network:
    driver: bridge
